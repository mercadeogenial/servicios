<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiExpress — Solicitar un servicio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div class="max-w-2xl mx-auto p-6">
    <a href="index.html" class="text-blue-600 hover:underline mb-4 inline-block font-semibold">← Volver al inicio</a>
    <h1 class="text-3xl font-bold text-blue-900 mb-2">Solicitar un servicio</h1>
    <p class="text-gray-600 mb-6">Contanos qué necesitás. Te derivamos con un proveedor verificado y coordinamos por WhatsApp.</p>

    <form id="form-cliente" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 space-y-4">
      <div>
        <label class="block text-sm font-semibold mb-1">Nombre completo</label>
        <input type="text" id="nombre" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ingresá tu nombre">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">WhatsApp</label>
        <input type="text" id="whatsapp" required pattern="^(?:\+?591)?[67][0-9]{7}$" class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ej: 71234567">
        <p class="text-xs text-gray-500 mt-1">8 dígitos, empieza en 6 o 7 (con o sin +591).</p>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Zona</label>
        <select id="zona" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option value="">Cargando zonas…</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Dirección exacta / condominio y N° de casa</label>
        <input type="text" id="direccion" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ej: Av. Banzer 4to anillo, Casa 5">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Categoría de servicio</label>
        <select id="categoria" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option value="">Cargando categorías…</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Describí el trabajo</label>
        <textarea id="descripcion" required rows="4" class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Contanos brevemente qué necesitás."></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Urgencia</label>
        <select id="urgencia" class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option value="hoy">Hoy mismo</option>
          <option value="2-3 dias">2-3 días</option>
          <option value="esta_semana">Esta semana</option>
          <option value="sin_apuro">Sin apuro</option>
        </select>
      </div>

      <div class="pt-4 border-t border-gray-200">
        <label class="flex items-start space-x-2 cursor-pointer">
          <input type="checkbox" id="acepto-terminos-cli" name="acepto_terminos" required class="mt-1 mr-2 w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
          <span class="text-sm text-gray-600">
            Acepto los <a href="terminos-clientes.html" target="_blank" class="text-blue-600 underline font-semibold">Términos de Uso para Clientes</a> de ServiExpress. Entiendo que ServiExpress es un intermediario tecnológico, que el contrato de servicio se celebra directamente con el proveedor, y que la mediación de disputas es a discreción de ServiExpress.
          </span>
        </label>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md">Enviar solicitud →</button>
    </form>

    <div id="mensaje-exito" class="hidden bg-green-50 border border-green-200 text-green-800 p-6 rounded-lg shadow-sm mt-6 text-center">
      <p class="font-bold text-lg mb-2">✓ Solicitud enviada</p>
      <p class="mb-4">Un operador te va a contactar por WhatsApp en breve.</p>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script>
    // 1. Inicializar la conexión global (igual que en el panel)
    window.db = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    // 2. Cargar Zonas y Categorías al iniciar
    async function cargarOpcionesFormulario() {
      try {
        const { data: zonas } = await window.db.from('zonas').select('id, nombre').eq('activa', true).order('nombre');
        const selectZona = document.getElementById('zona');
        if (selectZona && zonas) {
          selectZona.innerHTML = '<option value="">Elegí tu zona</option>' + zonas.map(z => `<option value="${z.id}">${z.nombre}</option>`).join('');
        }

        const { data: categorias } = await window.db.from('categorias').select('id, nombre').eq('activa', true).order('nombre');
        const selectCat = document.getElementById('categoria');
        if (selectCat && categorias) {
          selectCat.innerHTML = '<option value="">Elegí una categoría</option>' + categorias.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
        }
      } catch (err) {
        console.error("Error al cargar opciones:", err);
      }
    }
    document.addEventListener('DOMContentLoaded', cargarOpcionesFormulario);

    // 3. Manejar el envío del formulario
    document.getElementById('form-cliente').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.textContent = 'Enviando...'; btn.disabled = true;

      const formData = {
        nombre: document.getElementById('nombre').value,
        whatsapp: document.getElementById('whatsapp').value,
        zona_id: document.getElementById('zona').value,
        direccion: document.getElementById('direccion').value,
        categoria_id: document.getElementById('categoria').value,
        descripcion: document.getElementById('descripcion').value,
        urgencia: document.getElementById('urgencia').value,
        estado: 'pendiente'
      };

      const { error } = await window.db.from('solicitudes').insert([formData]);
      if (error) {
        alert('Error al enviar: ' + error.message);
        btn.textContent = 'Enviar solicitud →'; btn.disabled = false;
      } else {
        document.getElementById('form-cliente').classList.add('hidden');
        document.getElementById('mensaje-exito').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
