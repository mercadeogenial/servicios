<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiExpress — Panel del operador</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,900&family=Archivo:wght@400;500;600;700&display=swap');
  :root{ --rust:#c1502e; --ink:#1c1a17; --paper:#f4ede2; --paper-warm:#ece2d2; --teal:#1f4741; --line:#d8cbb3; --ok:#3d7a4f;}
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--paper); color:var(--ink); font-family:'Archivo',sans-serif;}
  h1,h2{font-family:'Fraunces',serif; font-weight:900;}
  header{display:flex; justify-content:space-between; align-items:center; padding:20px 4vw; border-bottom:2px solid var(--ink);}
  header h1{font-size:1.4rem;}
  #logoutBtn{background:none; border:2px solid var(--ink); border-radius:8px; padding:8px 16px; cursor:pointer; font-weight:600;}
  main{padding:24px 4vw 60px;}
  .tabs{display:flex; gap:0; border:2px solid var(--ink); border-radius:12px; overflow:hidden; max-width:600px; margin-bottom:28px;}
  .tab{flex:1; padding:12px; text-align:center; cursor:pointer; font-weight:700; background:transparent; border:none;}
  .tab.active{background:var(--ink); color:var(--paper);}
  .tab:not(:last-child){border-right:2px solid var(--ink);}
  .panel{display:none;} .panel.active{display:block;}
  .req-card{background:var(--paper-warm); border:2px solid var(--ink); border-radius:14px; padding:20px; margin-bottom:16px;}
  .req-head{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px;}
  .badge{font-size:0.72rem; text-transform:uppercase; font-weight:700; padding:4px 10px; border-radius:100px; background:var(--teal); color:#fff;}
  .badge.prioridad{background:var(--rust);}
  .req-body{margin-top:10px; font-size:0.92rem;}
  .req-actions{margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;}
  button.act{border:2px solid var(--ink); border-radius:8px; padding:8px 14px; background:#fff; cursor:pointer; font-weight:600; font-size:0.85rem;}
  button.act.primary{background:var(--rust); color:#fff;}
  button.act.ok{background:var(--ok); color:#fff;}
  .prov-select{margin-top:10px; display:flex; flex-wrap:wrap; gap:6px;}
  .prov-chip{border:2px solid var(--teal); color:var(--teal); border-radius:100px; padding:6px 12px; font-size:0.8rem; cursor:pointer;}
  .prov-chip.selected{background:var(--teal); color:#fff;}
  .contacto-row{display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-top:1px dashed var(--line); font-size:0.85rem;}
  .fotos-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .fotos-row a img{width:64px; height:64px; object-fit:cover; border-radius:8px; border:2px solid var(--ink); display:block;}
  table{width:100%; border-collapse:collapse; margin-top:12px;}
  th,td{text-align:left; padding:8px; border-bottom:1px solid var(--line); font-size:0.85rem;}
  #loginBox{max-width:360px; margin:80px auto; background:var(--paper-warm); border:2px solid var(--ink); border-radius:14px; padding:28px;}
  #loginBox input{width:100%; padding:10px; margin-top:6px; margin-bottom:14px; border:2px solid var(--ink); border-radius:8px;}
  #loginBox button{width:100%; padding:12px; background:var(--ink); color:var(--paper); border:none; border-radius:8px; font-weight:700; cursor:pointer;}
  #appWrap{display:none;}
</style>
</head>
<body>

<div id="loginBox">
  <h2 style="margin-bottom:16px;">Panel operador</h2>
  <label>Email</label><input id="loginEmail" type="email">
  <label>Contraseña</label><input id="loginPass" type="password">
  <button id="loginBtn">Entrar</button>
  <p id="loginError" style="color:var(--rust); margin-top:10px; font-size:0.85rem;"></p>
</div>

<div id="appWrap">
  <header>
    <h1>ServiExpress · Panel</h1>
    <button id="logoutBtn">Salir</button>
  </header>
  <main>
    <div class="tabs">
      <button class="tab active" data-tab="solicitudes">Solicitudes</button>
      <button class="tab" data-tab="proveedores">Proveedores</button>
    </div>

    <div class="panel active" id="panel-solicitudes"><div id="listaSolicitudes">Cargando…</div></div>
    <div class="panel" id="panel-proveedores"><div id="listaProveedores">Cargando…</div></div>
  </main>
</div>

<script src="supabase-config.js"></script>
<script>
  let proveedoresCache = [];

  // ---------- AUTH ----------
  supabaseClient.auth.onAuthStateChange((event, session)=>{
    if(session){ document.getElementById('loginBox').style.display='none'; document.getElementById('appWrap').style.display='block'; init(); }
    else{ document.getElementById('loginBox').style.display='block'; document.getElementById('appWrap').style.display='none'; }
  });

  document.getElementById('loginBtn').addEventListener('click', async ()=>{
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPass').value
    });
    if(error) document.getElementById('loginError').textContent = "No se pudo iniciar sesión: " + error.message;
  });
  document.getElementById('logoutBtn').addEventListener('click', ()=> supabaseClient.auth.signOut());

  // ---------- TABS ----------
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab === 'proveedores') cargarProveedores();
  }));

  function init(){ cargarSolicitudes(); cargarProveedoresCache(); }

  // ---------- SOLICITUDES ----------
  async function cargarSolicitudes(){
    const { data, error } = await supabaseClient
      .from('solicitudes')
      .select('*, clientes(nombre, whatsapp, direccion_exacta), categorias(nombre), zonas(nombre), solicitud_contactos(id, proveedor_id, respuesta, fecha_envio, fecha_respuesta, proveedores(nombre_razon_social, whatsapp))')
      .order('created_at', { ascending: false });

    const box = document.getElementById('listaSolicitudes');
    if(error){ box.textContent = "Error cargando solicitudes: " + error.message; return; }
    if(!data.length){ box.textContent = "No hay solicitudes todavía."; return; }

    box.innerHTML = data.map(s => renderSolicitud(s)).join('');
    // listeners de difusión y respuesta se atan después de renderizar
    data.forEach(s => atarEventos(s));
  }

  function renderSolicitud(s){
    const yaContactados = (s.solicitud_contactos || []);
    const candidatos = proveedoresCache.filter(p => !yaContactados.some(c => c.proveedor_id === p.id));
    return `
      <div class="req-card" data-id="${s.id}">
        <div class="req-head">
          <div>
            <strong>${s.categorias?.nombre || '—'}</strong> · ${s.zonas?.nombre || '—'}
            ${s.prioridad ? '<span class="badge prioridad">Urgente</span>' : ''}
            <span class="badge">${s.estado}</span>
          </div>
          <div style="font-size:0.8rem;">${new Date(s.created_at).toLocaleString('es-BO')}</div>
        </div>
        <div class="req-body">
          <div><b>Cliente:</b> ${s.clientes?.nombre} — ${s.clientes?.whatsapp} — ${s.clientes?.direccion_exacta || 'sin dirección'}</div>
          <div style="margin-top:6px;">${s.descripcion}</div>
          ${(s.fotos && s.fotos.length) ? `<div class="fotos-row">${s.fotos.map(u=>`<a href="${u}" target="_blank"><img src="${u}" alt="foto"></a>`).join('')}</div>` : ''}
        </div>

        ${s.estado === 'pendiente' || s.estado === 'difundida' ? `
        <div class="prov-select" data-role="candidatos">
          ${candidatos.map(p => `<div class="prov-chip" data-prov="${p.id}">${p.nombre_razon_social}</div>`).join('') || '<em>No hay más proveedores candidatos para difundir</em>'}
        </div>
        <div class="req-actions">
          <button class="act primary" data-action="difundir">Enviar a seleccionados →</button>
        </div>` : ''}

        ${yaContactados.length ? `
        <div style="margin-top:10px;">
          <b style="font-size:0.8rem;">Contactados:</b>
          ${yaContactados.map(c => `
            <div class="contacto-row">
              <span>${c.proveedores?.nombre_razon_social} (${c.proveedores?.whatsapp})</span>
              <span>
                ${c.respuesta === 'pendiente' ? `
                  <button class="act ok" data-action="aceptar" data-contacto="${c.id}" data-prov="${c.proveedor_id}">Aceptó</button>
                  <button class="act" data-action="rechazar" data-contacto="${c.id}">Rechazó</button>
                ` : `<b>${c.respuesta}</b>`}
              </span>
            </div>`).join('')}
        </div>` : ''}
      </div>`;
  }

  function atarEventos(s){
    const card = document.querySelector(`.req-card[data-id="${s.id}"]`);
    if(!card) return;

    card.querySelectorAll('.prov-chip').forEach(chip=>{
      chip.addEventListener('click', ()=> chip.classList.toggle('selected'));
    });

    const difundirBtn = card.querySelector('[data-action="difundir"]');
    if(difundirBtn) difundirBtn.addEventListener('click', async ()=>{
      const seleccionados = Array.from(card.querySelectorAll('.prov-chip.selected')).map(c=>c.dataset.prov);
      if(!seleccionados.length){ alert("Seleccioná al menos un proveedor."); return; }
      const rows = seleccionados.map(pid => ({ solicitud_id: s.id, proveedor_id: pid }));
      await supabaseClient.from('solicitud_contactos').insert(rows);
      await supabaseClient.from('solicitudes').update({ estado: 'difundida' }).eq('id', s.id);
      cargarSolicitudes();
    });

    card.querySelectorAll('[data-action="aceptar"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const contactoId = btn.dataset.contacto;
        const provId = btn.dataset.prov;
        // 1. marcar este contacto como aceptado
        await supabaseClient.from('solicitud_contactos').update({ respuesta: 'aceptado', fecha_respuesta: new Date().toISOString() }).eq('id', contactoId);
        // 2. marcar los demás contactos de la misma solicitud como sin_respuesta (ya fue tomado)
        await supabaseClient.from('solicitud_contactos').update({ respuesta: 'sin_respuesta' }).eq('solicitud_id', s.id).neq('id', contactoId).eq('respuesta','pendiente');
        // 3. asignar proveedor y actualizar estado de la solicitud
        await supabaseClient.from('solicitudes').update({ estado: 'aceptada', proveedor_asignado_id: provId, fecha_aceptacion: new Date().toISOString() }).eq('id', s.id);
        // 4. generar el cobro de Bs 10 — se dispara SOLO al aceptar (Cap. 4-5, Términos de Uso Sección 5.4)
        await supabaseClient.from('cobros').insert({ proveedor_id: provId, solicitud_id: s.id, monto_bs: 10.00 });
        cargarSolicitudes();
      });
    });
    card.querySelectorAll('[data-action="rechazar"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        await supabaseClient.from('solicitud_contactos').update({ respuesta: 'rechazado', fecha_respuesta: new Date().toISOString() }).eq('id', btn.dataset.contacto);
        cargarSolicitudes();
      });
    });
  }

  // ---------- PROVEEDORES ----------
  async function cargarProveedoresCache(){
    const { data } = await supabaseClient.from('proveedores').select('id, nombre_razon_social').eq('activo', true);
    proveedoresCache = data || [];
  }

  async function cargarProveedores(){
    const { data, error } = await supabaseClient.from('proveedores').select('*, proveedor_categorias(categorias(nombre)), proveedor_zonas(zonas(nombre))').order('created_at', {ascending:false});
    const box = document.getElementById('listaProveedores');
    if(error){ box.textContent = "Error: " + error.message; return; }
    box.innerHTML = `
      <table>
        <tr><th>Nombre</th><th>WhatsApp</th><th>Categorías</th><th>Zonas</th><th>Cobro pref.</th><th>Trabajos</th></tr>
        ${data.map(p => `
          <tr>
            <td>${p.nombre_razon_social}</td>
            <td>${p.whatsapp}</td>
            <td>${(p.proveedor_categorias||[]).map(c=>c.categorias?.nombre).join(', ')}</td>
            <td>${(p.proveedor_zonas||[]).map(z=>z.zonas?.nombre).join(', ')}</td>
            <td>${p.metodo_cobro || '—'}</td>
            <td>${(p.fotos_trabajos && p.fotos_trabajos.length) ? `<div class="fotos-row">${p.fotos_trabajos.map(u=>`<a href="${u}" target="_blank"><img src="${u}" alt="trabajo"></a>`).join('')}</div>` : '—'}</td>
          </tr>`).join('')}
      </table>`;
  }
</script>
</body>
</html>
